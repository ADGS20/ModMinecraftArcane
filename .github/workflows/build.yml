name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # 1. PASO NUEVO: Elimina herramientas pesadas (Android, .NET, etc.) para que Gradle tenga espacio de sobra
      - name: Free Disk Space (Borrar basura para Minecraft)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      # 2. 
      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # Configuración automatizada de Gradle y almacenamiento de cachés
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Otorga permisos de ejecución al archivo gradlew si no los tiene
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Compilación final del Mod Arcane Forge
      - name: Build with Gradle
        run: ./gradlew build